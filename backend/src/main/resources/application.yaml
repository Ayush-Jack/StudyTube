spring:
  application:
    name: studytube-backend

  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE:studytube}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}       # 15 minutes in ms
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}   # 7 days in ms

  youtube:
    api-key: ${YOUTUBE_API_KEY}
    base-url: https://www.googleapis.com/youtube/v3

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}